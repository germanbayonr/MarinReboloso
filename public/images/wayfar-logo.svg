<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" fill="currentColor">
  <!-- WAYFAR text -->
  <text x="100" y="35" font-family="serif" font-size="18" text-anchor="middle" letter-spacing="4">WAYFAR</text>
  
  <!-- Smile icon -->
  <g transform="translate(100, 55)">
    <!-- Two dots for eyes -->
    <circle cx="-8" cy="-3" r="1.5"/>
    <circle cx="8" cy="-3" r="1.5"/>
    <!-- Smile curve -->
    <path d="M -15 0 Q 0 8, 15 0" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>
